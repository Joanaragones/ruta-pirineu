<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa en Directe - Joan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estils.css">
</head>
<body>

<div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialització del mapa (Centrat a Vic per defecte)
        var map = L.map('map', { zoomControl: false }).setView([41.932769, 2.255467], 11);
        
        // Posem els controls del zoom a la dreta per no molestar al quadrat d'info
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        var iconaJoan = L.icon({
            iconUrl: 'joan.png',
            iconSize: [60, 60],
            iconAnchor: [30, 60]
        });

        // Funció per carregar les dades
        fetch('dades_ruta.json')
            .then(res => res.json())
            .then(data => 

                // 2. Dibuixar la ruta i posar el marcador
                if (data.ruta && data.ruta.length > 0) {
                    var poly = L.polyline(data.ruta, {
                        color: '#e63946', 
                        weight: 6,
                        opacity: 0.9
                    }).addTo(map);
                    
                    var ultimaPos = data.ruta[data.ruta.length - 1];
                    L.marker(ultimaPos, {icon: iconaJoan}).addTo(map);
                    
                    // Ajustar el mapa perquè es vegi tota la ruta feta
                    map.fitBounds(poly.getBounds(), {padding: [50, 50]});
                }
            })
            .catch(err => console.log("Encara no hi ha dades:", err));
    </script>
</body>
</html>
