<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta del Mar al Pirineu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estils.css">
</head>
<body>

    <div id="header">
        <h1>Del Mar al Pirineu</h1>
        <p>Seguiment en directe</p>
        <div id="stats">Km acumulats: <span id="km">0</span> km</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicialitzar el mapa (Leaflet)
        var map = L.map('map').setView([41.627, 2.691], 10);

        // 2. Afegir la capa d'OpenStreetMap (El mapa clàssic)
        // Substitueix la capa d'OpenStreetMap per aquesta de CartoDB (més neta i sense bloquejos)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

        // 3. Icona amb la teva foto
        var iconaJoan = L.icon({
            iconUrl: 'joan.png',
            iconSize: [60, 60],
            iconAnchor: [30, 60],
            popupAnchor: [0, -60],
            className: 'marker-joan'
        });

        // 4. Carregar dades d'Strava des del JSON
        fetch('dades_ruta.json')
    .then(response => response.json())
    .then(data => {
        console.log("Dades llegides del JSON:", data);

        // Aquesta línia busca 'ruta' o 'coordenades' automàticament
        var punts = data.ruta || data.coordenades;

        if (punts && punts.length > 0) {
            // 1. Dibuixar la línia
            var polyline = L.polyline(punts, {
                color: '#e63946',
                weight: 6,
                opacity: 0.9
            }).addTo(map);

            // 2. Actualitzar els KM al text
            document.getElementById('km').innerText = data.distancia;

            // 3. Posar la teva foto al final
            var ultimaPos = punts[punts.length - 1];
            L.marker(ultimaPos, {icon: iconaJoan}).addTo(map)
                .bindPopup("<b>Estic aquí!</b>")
                .openPopup();

            // 4. Centrar el mapa a la ruta
            map.fitBounds(polyline.getBounds(), {padding: [50, 50]});
        } else {
            console.error("No s'han trobat punts de ruta al JSON");
        }
    })
    .catch(err => console.error("Error carregant el fitxer JSON:", err));
    </script>
</body>
</html>
