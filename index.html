<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta del Mar al Pirineu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estils.css">
</head>
<body>

    <div id="fix-container">
        <div id="header">
            <h1>Del Mar al Pirineu</h1>
            <div id="stats">Km totals: <span id="km">0</span></div>
        </div>
        <div id="map"></div>
    </div>

    <div id="etapes-container">
        <h2>📋 Resum de les etapes</h2>
        <div id="llista-etapes">
            <p>Esperant la primera etapa... 🥾</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([42.4248, 3.1605], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        var iconaJoan = L.icon({
            iconUrl: 'joan.png',
            iconSize: [60, 60],
            iconAnchor: [30, 60]
        });

        fetch('dades_ruta.json')
            .then(res => res.json())
            .then(data => {
                if (data.distancia) document.getElementById('km').innerText = data.distancia;

                // Dibuixar Taula
                const divEtapes = document.getElementById('llista-etapes');
                if (data.etapes && data.etapes.length > 0) {
                    let html = '<table><thead><tr><th>Data</th><th>Etapa</th><th>Km</th></tr></thead><tbody>';
                    data.etapes.forEach(e => {
                        html += `<tr><td>${e.data}</td><td>${e.nom}</td><td>${e.distancia} km</td></tr>`;
                    });
                    html += '</tbody></table>';
                    divEtapes.innerHTML = html;
                }

                // Dibuixar Ruta
                if (data.ruta && data.ruta.length > 0) {
                    var poly = L.polyline(data.ruta, {color: '#e63946', weight: 5}).addTo(map);
                    L.marker(data.ruta[data.ruta.length - 1], {icon: iconaJoan}).addTo(map);
                    map.fitBounds(poly.getBounds(), {padding: [50, 50]});
                }
            });
    </script>
</body>
</html>
