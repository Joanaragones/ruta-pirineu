name: Actualitzar Mapa de Strava

on:
 workflow_dispatch: # Permet executar-lo a mà des de GitHub
  schedule:
    - cron: '0 21 * * *' # S'executa cada dia a les 22h (hora espanyola aprox)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instal·lar dependències
        run: pip install requests

      - name: Executar script de Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python update_map.py

      - name: Commit i Push dels canvis
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dades_ruta.json
          git commit -m "Actualització automàtica" || echo "Sense canvis"
          git push origin main --force
