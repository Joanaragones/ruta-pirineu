<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taula d'Etapes</title>
    <link rel="stylesheet" href="taula.css">
</head>
<body>

    <div id="etapes-container">
        <h2>📋 Full de Ruta: Del Mar al Pirineu</h2>
        <div id="llista-etapes">
            <p class="carregant">Carregant les etapes del projecte...</p>
        </div>
    </div>

    <script>
        fetch('dades_ruta.json')
            .then(res => res.json())
            .then(data => {
                const contenidor = document.getElementById('llista-etapes');
                
                if (data.etapes && data.etapes.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Etapa</th>
                                    <th>Data</th>
                                    <th>Traçat</th>
                                    <th>Distància</th>
                                    <th>Desnivell</th>
                                </tr>
                            </thead>
                            <tbody>`;

                    data.etapes.forEach(e => {
                        html += `
                            <tr>
                                <td class="Etapa">${e.etapa}</td)
                                <td class="data">${e.data}</td>
                                <td class="Traçat">${e.traçat}</td>
                                <td class="km">${e.distancia} km</td>
                                <td class="desnivell">${e.desnivell} m+</td>
                            </tr>`;
                    });
                    html += `
                        <tfoot style="background-color: #f8f9fa; font-weight: bold; border-top: 2px solid #ddd;">
                            <tr>
                                <td colspan="2" style="color: #1d3557; padding: 15px 12px;">TOTAL ACUMULAT</td>
                                <td class="km" style="padding: 15px 12px;">${data.distancia} km</td>
                                <td class="desnivell" style="padding: 15px 12px;">${data.desnivell_total} m+</td>
                            </tr>
                        </tfoot>`;
                        
                    html += '</tbody></table>';
                    contenidor.innerHTML = html;
                } else {
                    contenidor.innerHTML = "<p class='no-dades'></p>";
                }
            })
            .catch(err => {
                document.getElementById('llista-etapes').innerHTML = "<p class='error'>Error en carregar el fitxer JSON.</p>";
            });
    </script>
</body>
</html>
